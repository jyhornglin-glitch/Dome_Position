# fly.toml app configuration file
#
# See https://fly.io/docs/reference/configuration/ for information

app = "dome-position"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "dome_data"
  destination = "/data"
